services:
  # 🧠 AI Inference Engine
  vision-assistant:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    container_name: vlm_assistant_engine
    ports:
      - "7860:7860"
    volumes:
      - .:/app
      - ~/.cache/huggingface:/root/.cache/huggingface
    restart: unless-stopped

  # 🚪 Django Login Portal
  vision-portal:
    build:
      context: .
      dockerfile: Dockerfile.portal
    container_name: vlm_web_portal
    ports:
      - "8000:8000"
    volumes:
      - ./web_portal:/app
    depends_on:
      - vision-assistant
    restart: unless-stopped
