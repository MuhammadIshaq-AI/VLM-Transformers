<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background: #0b0e14;
            color: white;
            overflow: hidden;
        }
        .header {
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradio-frame {
            width: 100%;
            height: calc(100vh - 60px);
            border: none;
        }
        .btn-outline-light {
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h4 class="m-0">🧠 AI Vision Assistant <span class="badge bg-primary ms-2" style="font-size: 0.5em;">Enterprise</span></h4>
        <div>
            <span class="me-3 text-secondary">Logged in as: <strong>{{ user.username }}</strong></span>
            <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-danger">Logout</a>
        </div>
    </div>
    <!-- Embedding the Gradio App dynamically using the current server IP -->
    <script>
        document.write('<iframe src="http://' + window.location.hostname + ':7860" class="gradio-frame"></iframe>');
    </script>
</body>
</html>
